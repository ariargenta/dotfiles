# ~/.config/zsh/starshi.toml

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = "$os $username[@](yellow)$hostname $directory $git_branch$git_status$character"

[username]
format = "[$user](green bold)"
show_always = true

[hostname]
ssh_only = false
format = "[$hostname](cyan bold)"
disabled = false

[os]
disabled = false
format = "[$symbol](#blue) "

[os.symbols]
Arch = "îœ²"

[directory]
format = "[$path](bold purple) "
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = "îœ¥"
format = "[$symbol $branch](bold purple) "

[git_status]
format = "($ahead_behind$staged$modified$untracked$deleted$conflicted)"
ahead = "[â‡،$count ](bold cyan)"
behind = "[â‡£$count ](bold cyan)"
diverged = "[â‡،$ahead_countâ‡£$behind_count ](bold cyan)"
staged = "[ïپ§$count ](bold green)"
modified = "[ï‘„$count ](bold yellow)"
untracked = "[ï„¨$count ](bold red)"
deleted = "[ï€چ$count ](bold red)"
conflicted = "َ°‍‡$count ](bold red)"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
vimcmd_symbol = "[>](blue)"
